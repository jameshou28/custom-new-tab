<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>custom-new-tab</title> 
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <div class="greeting">
        <p class="eyebrow">GOOD AFTERNOON</p>
        <h1 class="clock">2:58</h1>
        <p class="date">James - Saturday, July 4</p>
      </div>

      <div class="weather">
        <span class="weather-temp">--°</span>
        <span class="weather-condition">--</span>
      </div>

      <div class="bottom">
      <div class="search">
        <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2">
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="21" y1="21" x2="16.5" y2="16.5"></line>
        </svg>
        <input type="text" placeholder="Search Google" />
      </div>

      <div class="shortcuts">
        <a class="shortcut" href="https://mail.google.com">
          <span class="tile"><img src="/src/assets/icons/gmail.svg" alt="Gmail" /></span>
          <span class="label">Gmail</span>
        </a>
        <a class="shortcut" href="https://drive.google.com">
          <span class="tile"><img src="/src/assets/icons/drive.svg" alt="Drive" /></span>
          <span class="label">Drive</span>
        </a>
        <a class="shortcut" href="https://github.com">
          <span class="tile"><img src="/src/assets/icons/github.svg" alt="GitHub" /></span>
          <span class="label">GitHub</span>
        </a>
        <a class="shortcut" href="https://claude.ai">
          <span class="tile"><img src="/src/assets/icons/claude.svg" alt="Claude" /></span>
          <span class="label">Claude</span>
        </a>
        <a class="shortcut" href="https://calendar.google.com">
          <span class="tile"><img src="/src/assets/icons/calendar.svg" alt="Calendar" /></span>
          <span class="label">Calendar</span>
        </a>
        <a class="shortcut" href="#">
          <span class="tile"></span>
          <span class="label">SHORTCUT</span>
        </a>
      </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
